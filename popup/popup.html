<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>Artblock</h1>
      <p class="tagline">Every ad becomes a masterpiece</p>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Enabled</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Hover controls</span>
      <label class="toggle">
        <input type="checkbox" id="showHoverControls" checked>
        <span class="slider"></span>
      </label>
    </div>
    <p class="feedback" id="hoverFeedback"></p>

    <div class="setting-row">
      <label for="category">Source</label>
      <select id="category">
        <optgroup label="Everything">
          <option value="all">All Sources (Chaos Mode)</option>
        </optgroup>
        <optgroup label="Fine Art">
          <option value="impressionism">Impressionism</option>
          <option value="japanese">Japanese Woodblock</option>
          <option value="photography">Photography</option>
          <option value="renaissance">Renaissance</option>
          <option value="modern">Modern / Contemporary</option>
        </optgroup>
        <optgroup label="Space">
          <option value="space">NASA Space Imagery</option>
        </optgroup>
      </select>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="count">0</span>
        <span class="stat-label">ads replaced this session</span>
      </div>
    </div>

    <div class="profile-section">
      <div class="section-label">Your profile</div>
      
      <div class="data-row">
        <button class="action-btn" id="exportSettings">Export settings</button>
        <button class="action-btn" id="importSettings">Import settings</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
      <p class="feedback" id="profileFeedback"></p>

      <div class="reset-row" id="resetSiteRow" style="display:none">
        <button class="reset-btn" id="resetSite">Reset site settings</button>
      </div>

      <div class="reset-row">
        <button class="reset-btn" id="resetProfile">Reset profile</button>
      </div>
    </div>

    <div class="footer">
      <p>Art Institute of Chicago &middot; The Met &middot; NASA</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
